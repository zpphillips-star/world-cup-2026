<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark navy background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#001830"/>
  
  <!-- "2" numeral - large bold -->
  <text x="20" y="360" 
    font-family="Arial Black, Impact, sans-serif" 
    font-weight="900" 
    font-size="380" 
    fill="white"
    letter-spacing="-20">26</text>
  
  <!-- Trophy silhouette overlaid in dark navy to cut through the white numbers -->
  <!-- Trophy cup body -->
  <ellipse cx="256" cy="175" rx="75" ry="55" fill="#001830"/>
  <rect x="181" y="170" width="150" height="100" fill="#001830"/>
  <!-- Trophy handles -->
  <path d="M181 195 Q140 200 145 240 Q150 270 185 270" stroke="#001830" stroke-width="22" fill="none"/>
  <path d="M331 195 Q372 200 367 240 Q362 270 327 270" stroke="#001830" stroke-width="22" fill="none"/>
  <!-- Trophy stem -->
  <rect x="237" y="270" width="38" height="60" fill="#001830"/>
  <!-- Trophy base -->
  <rect x="200" y="325" width="112" height="20" rx="4" fill="#001830"/>
  <rect x="185" y="342" width="142" height="22" rx="4" fill="#001830"/>
  <!-- Trophy top dome -->
  <ellipse cx="256" cy="170" rx="76" ry="50" fill="#001830"/>
  <path d="M180 190 Q180 100 256 95 Q332 100 332 190" fill="#001830"/>
  
  <!-- FIFA text at bottom of trophy -->
  <text x="256" y="358" 
    font-family="Arial Black, sans-serif" 
    font-weight="900" 
    font-size="32" 
    fill="white"
    text-anchor="middle"
    letter-spacing="6">FIFA</text>
</svg>
