<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- App background -->
  <rect width="512" height="512" rx="96" fill="#0d0d14"/>

  <!-- Soccer ball — white circle base -->
  <circle cx="256" cy="200" r="130" fill="white"/>

  <!-- Soccer ball black patches (classic pentagon pattern) -->
  <!-- Center pentagon -->
  <polygon points="256,128 296,157 280,204 232,204 216,157" fill="#111118"/>
  <!-- Top-left patch -->
  <polygon points="174,138 216,157 216,116 196,95 163,107" fill="#111118"/>
  <!-- Top-right patch -->
  <polygon points="338,138 296,157 296,116 316,95 349,107" fill="#111118"/>
  <!-- Bottom-left patch -->
  <polygon points="178,252 216,204 232,204 232,252 200,272" fill="#111118"/>
  <!-- Bottom-right patch -->
  <polygon points="334,252 296,204 280,204 280,252 312,272" fill="#111118"/>
  <!-- Bottom patch -->
  <polygon points="256,280 232,252 256,238 280,252" fill="#111118"/>

  <!-- "2026" text -->
  <text x="256" y="400"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900"
    font-size="120"
    fill="white"
    text-anchor="middle"
    letter-spacing="-4">2026</text>

  <!-- Thin cyan underline accent -->
  <rect x="156" y="418" width="200" height="6" rx="3" fill="#00d4ff" opacity="0.7"/>
</svg>
